site_name: ethlo r7 Gateway
site_description: The Performant Java Gateway
site_url: https://r7.ethlo.com
repo_url: https://github.com/ethlo/r7
repo_name: ethlo/r7

theme:
  name: material
  palette:
    scheme: slate
    primary: black
    accent: amber
  features:
    - navigation.tabs
    - content.code.copy
    - toc.integrate
  logo: assets/r7.svg
  favicon: assets/r7.svg

extra:
  announcement: >
    **Note:** r7 is currently in active pre-release development. Features, configuration schemas, and APIs may change without notice.

nav:
  - Overview: index.md
  - Quickstart: quickstart.md
  - Configuration: config.md
  - Extensibility: extensibility.md
  - Journaling: journaling.md
  - Benchmarks: benchmarks.md

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: true
      pygments_lang_class: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format