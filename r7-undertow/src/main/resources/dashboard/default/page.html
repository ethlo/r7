<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>r7 gateway</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%230a0a0b'/%3E%3Ctext x='12' y='44' font-family='monospace' font-size='34' font-weight='bold' fill='%23e4e4e7'%3Er%3C/text%3E%3Ctext x='32' y='44' font-family='monospace' font-size='34' font-weight='bold' fill='%23ff5e00'%3E7%3C/text%3E%3C/svg%3E">
    <style>
        /* ==========================================================================
           1. THEMING & VARIABLES
           ========================================================================== */
        :root {
            --base-size: 14px;
            --bg: #0a0a0b;
            --fg: #e4e4e7;
            --accent: #ff5e00;
            --dim: #a1a1aa;
            --brighter: #efeef1;
            --border: #27272a;
            --border-subtle: rgba(255, 255, 255, 0.05);
            --border-dotted: rgba(128, 128, 128, 0.3);
            --row-hover: #18181b;
            --panel: #111112;
            --card-bg: #131315;
        }

        /* ==========================================================================
           2. GLOBAL & BASE STYLES
           ========================================================================== */
        html {
            font-size: var(--base-size);
        }

        body {
            font-family: 'JetBrains Mono', 'Roboto Mono', monospace;
            background: var(--bg);
            color: var(--fg);
            margin: 0;
            padding: 2.5rem;
            font-size: 1rem;
            font-weight: 400;
            -webkit-font-smoothing: antialiased;
        }

        pre {
            background: #09090b;
            padding: 1rem;
            color: var(--fg);
            font-size: 0.8rem;
            border: 1px solid var(--border);
            overflow-x: auto;
            border-radius: 6px;
        }

        h1 {
            margin: 0;
            font-size: 1.2rem;
            font-weight: 500;
            letter-spacing: 2px;
        }

        h1 span {
            color: var(--accent);
        }

        /* ==========================================================================
           3. LAYOUT COMPONENTS
           ========================================================================== */
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            border-bottom: 1px solid var(--border);
            padding-bottom: 1.5rem;
            margin-bottom: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .app-footer {
            margin-top: 3rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--border);
            text-align: right;
            font-size: 0.65rem;
            color: var(--dim);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* ==========================================================================
           4. TYPOGRAPHY & UTILITIES
           ========================================================================== */
        .sub {
            font-size: 0.85rem;
            color: var(--dim);
            margin-top: 4px;
        }

        .sum {
            font-size: 0.85rem;
            color: var(--brighter);
            margin-top: 4px;
        }

        .sys-vitals {
            color: var(--dim);
            font-size: 0.9rem;
            margin-top: 0.5rem;
        }

        .sys-info {
            font-size: 0.9rem;
            color: var(--dim);
        }

        #sys-version {
            color: var(--fg);
            font-weight: 500;
        }

        .text-muted {
            opacity: 1;
        }

        .text-dim {
            opacity: 0.7;
        }

        .text-truncate {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .text-nowrap {
            white-space: nowrap;
        }

        .text-right {
            text-align: right;
        }

        .spacer-sm {
            height: 6px;
        }

        .status-indicator {
            margin-right: 6px;
        }

        /* Status Colors */
        .text-warn {
            color: #ff9800;
            font-weight: 300;
        }

        .text-err {
            color: #ee4444;
            font-weight: 300;
        }

        .text-http {
            color: #00d4ff;
            font-weight: 300;
        }

        .text-ws {
            color: #00ff88;
            font-weight: 300;
        }

        .text-4xx {
            color: rgba(200, 152, 0, 0.7);
            font-weight: 300;
        }

        .text-5xx {
            color: rgba(238, 100, 100, 0.7);
            font-weight: 300;
        }

        .text-3xx {
            color: rgba(50, 150, 255, 0.7);
            font-weight: 300;
        }

        .text-2xx {
            color: rgba(0, 200, 100, 0.7);
            font-weight: 300;
        }

        /* ==========================================================================
           5. TABLE STYLES
           ========================================================================== */
        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            font-size: 0.90rem;
            color: var(--dim);
            padding: 0.8rem 1rem;
            border-bottom: 1px solid var(--border);
            font-weight: 400;
        }

        td {
            padding: 0.8rem;
            border-bottom: 1px solid var(--border);
            vertical-align: top;
        }

        th, td {
            border-right: 1px solid var(--border-subtle);
        }

        th:last-child, td:last-child {
            border-right: none;
        }

        tr.clickable-row {
            cursor: pointer;
            transition: background 0.15s ease;
        }

        tr.clickable-row:hover td {
            background: var(--row-hover);
        }

        tr.clickable-row:hover td:first-child {
            box-shadow: inset 3px 0 0 var(--accent);
        }

        tr.total-row td {
            background: var(--card-bg);
            border-bottom: 1px solid var(--dim);
            padding-top: 0.8rem;
            padding-bottom: 0.8rem;
        }

        .col-route {
            width: 250px;
            min-width: 250px;
            max-width: 250px;
            padding-right: 15px;
        }

        /* ==========================================================================
           6. METRICS UI (Dotted Leaders)
           ========================================================================== */
        .metric-row {
            display: flex;
            align-items: flex-end;
            line-height: 1.1;
            margin: 0;
            padding-bottom: 2px;
        }

        .metric-label {
            opacity: 1;
        }

        .metric-leader {
            flex-grow: 1;
            border-bottom: 1px dotted var(--border-dotted);
            margin: 0 0.5rem;
            position: relative;
            top: -4px;
        }

        .metric-value {
            white-space: nowrap;
        }

        /*
        ==========================================================================
        7. VIEW SLIDER (In-Place Transition)
        ========================================================================== */
        #view-slider {
            position: relative;
            width: 100%;
            min-height: 400px;
        }

        .slide-pane {
            width: 100%;
            transition: transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1), opacity 0.2s ease;
        }

        /* Default State: Table is active, Details are hidden */
        #pane-table {
            position: relative;
            transform: translateX(0);
            opacity: 1;
            pointer-events: auto;
        }

        #pane-details {
            position: absolute;
            top: 0;
            left: 0;
            transform: translateX(40px);
            opacity: 0;
            pointer-events: none;
        }

        /* Active State: Details are active, Table is hidden */
        #view-slider.show-details-view #pane-table {
            position: absolute;
            top: 0;
            left: 0;
            transform: translateX(-40px);
            opacity: 0;
            pointer-events: none;
        }

        #view-slider.show-details-view #pane-details {
            position: relative;
            transform: translateX(0);
            opacity: 1;
            pointer-events: auto;
        }

        /* Masonry Grid inside the details pane */
        #details-content {
            column-width: 360px;
            column-gap: 1.5rem;
            padding-bottom: 2rem;
        }

        /* Prevent column breaks inside cards */
        .panel-section {
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 1.2rem;
            margin-bottom: 1.5rem;
            break-inside: avoid;
            page-break-inside: avoid;
            overflow: hidden;
        }

        .panel-header-container {
            column-span: all;
            display: flex;
            justify-content: space-between;
            align-items: center; /* Center align instead of flex-start */
            border-bottom: 1px solid rgba(128, 128, 128, 0.15); /* Much softer border */
            padding-bottom: 0.75rem; /* Tighter spacing */
            margin-bottom: 1.5rem;
        }

        .panel-title {
            font-size: 1.05em; /* Scaled down significantly */
            font-weight: 500;
            color: var(--fg);
            margin: 0;
            letter-spacing: 1px;
            display: flex;
            align-items: baseline;
            gap: 8px;
        }

        .panel-subtitle {
            font-size: 0.9em;
            color: var(--dim);
            word-break: break-all;
            line-height: 1.2;
        }

        .panel-section-title {
            font-size: 0.85em;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--brighter);
            border-bottom: 1px solid rgba(128, 128, 128, 0.3);
            padding-bottom: 8px;
            margin-bottom: 16px;
        }

        /* Convert the close button to a subtle text link */
        .panel-close-btn {
            background: transparent;
            border: none;
            color: var(--dim);
            font-family: inherit;
            font-size: 0.8rem;
            padding: 4px 8px;
            cursor: pointer;
            transition: color 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .panel-close-btn:hover {
            color: var(--fg);
            background: transparent;
        }

        .panel-close-icon {
            font-size: 1.2em;
            line-height: 0;
            position: relative;
            top: -1px;
        }

        /* ==========================================================================
           8. JOURNALING & BADGES
           ========================================================================== */
        .pill-group {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
            margin-bottom: 8px;
            font-size: 0.85em
        }

        .journal-tag {
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.85em;
            background: rgba(128, 128, 128, 0.1);
            opacity: 0.5;
            border: 1px solid rgba(128, 128, 128, 0.2);
            letter-spacing: 1px;
            transition: all 0.2s ease;
        }

        [class*="journal-active-"] {
            opacity: 1;
            border-color: currentColor;
        }

        .journal-active-none {
            color: var(--dim);
            border-color: var(--dim);
            background: rgba(161, 161, 170, 0.1);
        }

        .journal-active-metadata {
            color: #2dd4bf;
            border-color: #2dd4bf;
            background: rgba(45, 212, 191, 0.1);
        }

        .journal-active-headers {
            color: #3b82f6;
            border-color: #3b82f6;
            background: rgba(59, 130, 246, 0.1);
        }

        .journal-active-full {
            color: #a855f7;
            border-color: #a855f7;
            background: rgba(168, 85, 247, 0.1);
        }

        .j-badge {
            font-weight: 900;
            display: inline-block;
            min-width: 14px;
            text-align: center;
        }

        .sys-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--dim);
            padding: 6px 12px;
            font-family: inherit;
            font-size: 0.8rem;
            letter-spacing: 1px;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.2s ease;
        }

        .sys-btn:hover {
            background: var(--card-bg);
            color: var(--fg);
            border-color: rgba(128, 128, 128, 0.4);
        }
    </style>
</head>
<body>

<div class="container" id="main-container">
    <header>
        <div>
            <h1><span>r7</span> GATEWAY</h1>
            <div class="sys-vitals" id="sys-vitals">UPTIME: -- | SYS: -- | ROUTES: -- | DISK: --</div>
        </div>
        <div style="display: flex; gap: 20px; align-items: center;">
            <button class="sys-btn" onclick="showConfigDetails()">CONFIG</button>
            <div class="sys-info" id="last-update">CONNECTING...</div>
        </div>
    </header>

    <div id="view-slider">

        <div id="pane-table" class="slide-pane">
            <table id="route-table">
                <thead>
                <tr>
                    <th class="col-route">ROUTE</th>
                    <th class="col-active">STATUS</th>
                    <th class="col-totals">TOTALS</th>
                    <th class="col-ingress">INGRESS / EGRESS</th>
                    <th class="col-journal">JOURNAL</th>
                </tr>
                </thead>
                <tbody id="view"></tbody>
            </table>
        </div>

        <div id="pane-details" class="slide-pane">
            <div id="details-content"></div>
        </div>

    </div>

    <footer class="app-footer">
        r7 GATEWAY // SYS: <span id="sys-version">--</span> // ROUTES: <span id="routes-version">--</span>
    </footer>
</div>

<div id="details-panel">

</div>

<script>
    const FRACTION_DIGITS = 2;
    const UNITS = ['B', 'KB', 'MB', 'GB', 'TB'];

    let previousGcTime = null;
    let currentGcRate = 0;

    function getUnitIndex(b) {
        if (b === 0 || b == null) return 0;
        return Math.min(Math.floor(Math.log(b) / Math.log(1024)), UNITS.length - 1);
    }

    function formatBytes(b, forceUnitIndex = -1) {
        const i = forceUnitIndex >= 0 ? forceUnitIndex : getUnitIndex(b);
        if (b === 0 || b == null) {
            return forceUnitIndex >= 0 ? '0.00 ' + UNITS[i] : '0 B';
        }
        return (b / Math.pow(1024, i)).toFixed(FRACTION_DIGITS) + ' ' + UNITS[i];
    }

    function getPressureClass(used, max) {
        if (!max || max <= 0) return '';
        const ratio = used / max;
        if (ratio >= 0.90) return 'text-err';
        if (ratio >= 0.80) return 'text-warn';
        return '';
    }

    function formatCompact(num) {
        if (num === 0 || num == null) return '0';
        return new Intl.NumberFormat(window.locale, {
            notation: 'compact',
            minimumFractionDigits: 1,
            maximumFractionDigits: 1
        }).format(num);
    }

    function formatUptime(iso) {
        if (!iso) return "--";
        const match = iso.match(/P(?:(\d+)D)?T(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)(?:\.\d+)?S)?/);
        if (!match) return iso;

        const d = match[1] ? `${match[1]}d ` : '';
        const h = (match[2] || '0').padStart(2, '0');
        const m = (match[3] || '0').padStart(2, '0');
        const s = (match[4] || '0').padStart(2, '0');

        return `${d}${h}:${m}:${s}`;
    }

    function parseDurationMs(iso) {
        if (!iso || !iso.startsWith('P')) return 0;
        let ms = 0;
        const h = iso.match(/([\d.]+)H/);
        const m = iso.match(/([\d.]+)M/);
        const s = iso.match(/([\d.]+)S/);

        if (h) ms += parseFloat(h[1]) * 3600000;
        if (m) ms += parseFloat(m[1]) * 60000;
        if (s) ms += parseFloat(s[1]) * 1000;

        return ms;
    }

    function parseTimestamp(iso) {
        if (!iso || iso === "1970-01-01T00:00:00Z") return 0;
        return new Date(iso).getTime();
    }

    function timeAgo(ts) {
        const time = typeof ts === 'string' ? parseTimestamp(ts) : ts;
        if (!time || time === 0) return 'NEVER';
        const diff = Math.floor((Date.now() - time) / 1000);
        if (diff < 2) return 'NOW';
        if (diff < 60) return `${diff}s AGO`;

        const m = Math.floor(diff / 60);
        if (m < 60) return `${m}m AGO`;

        const h = Math.floor(m / 60);
        if (h < 24) return `${h}h AGO`;

        return `${Math.floor(h / 24)}d AGO`;
    }

    function sumStatuses(statusObj, min, max) {
        if (!statusObj) return 0;
        let sum = 0;
        for (const [code, count] of Object.entries(statusObj)) {
            const c = parseInt(code, 10);
            if (c >= min && c <= max) sum += count;
        }
        return sum;
    }

    const mRow = (label, primaryValue, isSum = false, valueClass = '', secondaryValue = null) => {
        const valContainer = secondaryValue !== null
            ? `<div style="display: flex; justify-content: flex-end; gap: 1.25rem; text-align: right; font-variant-numeric: tabular-nums; white-space: nowrap;">
                 <span class="${valueClass}">${primaryValue}</span>
                 <span class="${valueClass}">${secondaryValue}</span>
               </div>`
            : `<div style="display: block; text-align: right; font-variant-numeric: tabular-nums; white-space: nowrap;">
                 <span class="${valueClass}">${primaryValue}</span>
               </div>`;

        return `
    <div class="${isSum ? 'sum' : 'sub'} metric-row" style="display: flex; align-items: baseline;">
        <span class="metric-label">${label}</span>
        <span class="metric-leader"></span>
        <div class="metric-value">
            ${valContainer}
        </div>
    </div>`;
    };

    const jBadge = (lvl) => {
        const l = (lvl || 'NONE').toUpperCase();
        return `<span class="journal-active-${l.toLowerCase()} j-badge">${l.charAt(0)}</span>`;
    };

    function formatPrimitive(val) {
        if (typeof val === 'boolean') return val ? '<span class="text-2xx">TRUE</span>' : '<span class="text-dim">FALSE</span>';
        if (val == null) return '--';
        return val;
    }

    function showConfigDetails() {
        const data = window.currentData;
        if (!data || !data.system) return;

        window.currentOpenRoute = '__CONFIG__';
        const sys = data.system;
        const cfg = sys.configuration || {};

        // Fallback if memory metrics are mapped differently in your final JSON
        const mem = sys.memory || data.memory || null;

        document.getElementById('details-content').innerHTML = `
        <div class="panel-header-container">
            <div class="panel-title">
                <span style="color: var(--dim); font-weight: 300;">SYSTEM //</span> CONFIGURATION
            </div>
            <button class="panel-close-btn" onclick="closeDetails()">
                <span class="panel-close-icon">←</span> BACK
            </button>
        </div>

        <div class="panel-section">
            <div class="panel-section-title">Environment Info</div>
            ${mRow('VERSION', sys.version, true)}
            ${mRow('STARTED AT', new Date(sys.started_at).toLocaleString(), false)}
            ${mRow('UPTIME', formatUptime(sys.uptime), false)}
            <div class="spacer-sm"></div>
            ${mRow('BIND ADDRESS', `${cfg.host}:${cfg.port}`, false)}
            ${mRow('STATUS ADDRESS', `${cfg.status_host}:${cfg.status_port}`, false)}
        </div>

        <div class="panel-section">
            <div class="panel-section-title">Undertow Options</div>
            ${mRow('HTTP/2 ENABLED', formatPrimitive(cfg.options?.enable_http2), true)}
            ${mRow('DIRECT BUFFERS', formatPrimitive(cfg.options?.direct_buffers), false)}
            ${mRow('BUFFER SIZE', formatBytes(cfg.options?.buffer_size), false)}
            ${mRow('MAX HEADER SIZE', formatBytes(cfg.options?.max_header_size), false)}
            ${mRow('MAX HEADER COUNT', cfg.options?.max_header_count, false)}
        </div>

        <div class="panel-section">
            <div class="panel-section-title">Worker Thread Pool</div>
            ${mRow('I/O THREADS', cfg.worker?.io_threads, true)}
            ${mRow('TASK CORE THREADS', cfg.worker?.task_core_threads, false)}
            ${mRow('TASK MAX THREADS', cfg.worker?.task_max_threads, false)}
            ${mRow('STACK SIZE', formatBytes(cfg.worker?.stack_size), false)}
            ${mRow('CONN LOW WATER', cfg.worker?.connection_low_water?.toLocaleString(), false)}
            ${mRow('CONN HIGH WATER', cfg.worker?.connection_high_water?.toLocaleString(), false)}
        </div>

        <div class="panel-section">
            <div class="panel-section-title">Socket & Proxy</div>
            ${mRow('TCP NODELAY', formatPrimitive(cfg.socket?.tcp_nodelay), true)}
            ${mRow('REUSE ADDRESSES', formatPrimitive(cfg.socket?.reuse_addresses), false)}
            ${mRow('BACKLOG', cfg.socket?.backlog, false)}
            <div class="spacer-sm"></div>
            ${mRow('PROXY MAX QUEUE', cfg.proxy?.max_queue_size, false)}
            ${mRow('PROXY CONNS / THREAD', cfg.proxy?.connections_per_thread, false)}
        </div>

        <div class="panel-section">
            <div class="panel-section-title">Journal Storage</div>
            ${mRow('WORK DIR', `<span class="text-dim text-truncate" style="max-width: 150px; display: inline-block; vertical-align: bottom;" title="${cfg.storage?.work_dir}">${cfg.storage?.work_dir}</span>`, true)}
            ${mRow('SHARD COUNT', cfg.storage?.shard_count, false)}
            ${mRow('SHARD SIZE', formatBytes(cfg.storage?.shard_size), false)}
            ${mRow('PRE-FAULT', formatPrimitive(cfg.storage?.pre_fault), false)}
        </div>

        <div class="panel-section" id="mem-section">
            <div class="panel-section-title">Resource Pressure</div>
            ${mem ? `
                ${mRow('HEAP MEMORY',
            `<span class="${getPressureClass(mem.heap_used, mem.heap_max)}">${formatBytes(mem.heap_used)}</span>`,
            true, '', formatBytes(mem.heap_max) + ' MAX')}

                ${mRow('DIRECT MEMORY (NIO)',
            formatBytes(mem.direct_used),
            false, '', mem.direct_max > 0 ? formatBytes(mem.direct_max) + ' MAX' : 'UNLIMITED')}

                ${mRow('FILE DESCRIPTORS',
            `<span class="${getPressureClass(mem.open_fds, mem.max_fds)}">${mem.open_fds.toLocaleString()}</span>`,
            false, '', mem.max_fds > 0 ? mem.max_fds.toLocaleString() + ' MAX' : '--')}
                ${mRow('TOTAL GC TIME',
            mem.gc_time_ms.toLocaleString() + ' ms',
            false,
            '',
            `<span class="${currentGcRate > 50 ? 'text-warn' : (currentGcRate > 200 ? 'text-err' : 'text-dim')}">
           +${currentGcRate} ms/s
       </span>`)}
            ` : `<div class="sub text-dim" style="padding: 4px;">Resource data pending...</div>`}
        </div>
    `;

        openDetails();
    }

    function drawStackedSparkline(canvas, data) {
        const ctx = canvas.getContext('2d');
        const dpr = window.devicePixelRatio || 1;
        const rect = canvas.getBoundingClientRect();

        if (canvas.width !== rect.width * dpr) {
            canvas.width = rect.width * dpr;
            canvas.height = rect.height * dpr;
            canvas.style.width = `${rect.width}px`;
            canvas.style.height = `${rect.height}px`;
        }

        const logicalWidth = rect.width;
        const logicalHeight = rect.height;
        const labelHeight = 18;
        const chartHeight = logicalHeight - labelHeight;

        ctx.save();
        ctx.scale(dpr, dpr);
        ctx.clearRect(0, 0, logicalWidth, logicalHeight);

        const metadata = data?.metadata || { capacity: 150, interval: 'PT2S' };
        const successData = data?.success || [];
        const clientData = data?.client_error || [];
        const serverData = data?.server_error || [];
        const capacity = metadata.capacity;

        let maxValue = 0;
        [successData, clientData, serverData].forEach(arr => {
            arr.forEach(v => { if (v > maxValue) maxValue = v; });
        });

        // Determine state
        const isSystemSilent = maxValue === 0;
        const displayMax = maxValue * 1.1; // 10% Headroom

        // 1. Grid and Labels
        ctx.strokeStyle = 'rgba(255, 255, 255, 0.08)';
        ctx.lineWidth = 1;
        for (let i = 0; i <= 4; i++) {
            const y = (chartHeight / 4) * i;
            ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(logicalWidth, y); ctx.stroke();
            const x = (logicalWidth / 4) * i;
            ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, chartHeight); ctx.stroke();
        }

        ctx.font = '600 11px ui-monospace, "Roboto Mono", monospace';
        ctx.fillStyle = 'rgba(255, 255, 255, 0.7)'; // 0.7 Opacity
        const intervalSec = parseInt(metadata.interval.match(/\d+/)[0]) || 1;
        const timeVal = (capacity * intervalSec) >= 60 ? `${Math.round((capacity * intervalSec) / 60)}m` : `${capacity * intervalSec}s`;
        ctx.textAlign = 'left'; ctx.fillText(`-${timeVal}`, 2, logicalHeight - 5);
        ctx.textAlign = 'right'; ctx.fillText('now', logicalWidth - 2, logicalHeight - 5);

        if (isSystemSilent) {
            ctx.textAlign = 'center';
            ctx.fillStyle = 'rgba(255, 255, 255, 0.2)';
            ctx.fillText('AWAITING TELEMETRY', logicalWidth / 2, (chartHeight / 2) + 5);
            ctx.restore();
            return;
        }

        // 2. Drawing Logic
        const stepX = logicalWidth / (capacity - 1);

        const renderPath = (dataArray, color, isSuccess = false) => {
            if (!dataArray.length) return;

            // Create Path
            const linePath = new Path2D();
            let isDrawing = false;

            for (let i = 0; i < dataArray.length; i++) {
                const val = Number(dataArray[i]) || 0;
                const x = i * stepX;
                const y = chartHeight - ((val / displayMax) * chartHeight);

                if (val > 0) {
                    if (!isDrawing) {
                        linePath.moveTo(x, y);
                        isDrawing = true;
                    } else {
                        linePath.lineTo(x, y);
                    }
                } else {
                    isDrawing = false;
                }
            }

            // Draw the Fill for Success only
            if (isSuccess) {
                const fillPath = new Path2D(linePath);
                // Close the path to the bottom
                fillPath.lineTo(logicalWidth, chartHeight);
                fillPath.lineTo(0, chartHeight);
                fillPath.closePath();

                const grad = ctx.createLinearGradient(0, 0, 0, chartHeight);
                grad.addColorStop(0, 'rgba(46, 204, 113, 0.15)');
                grad.addColorStop(1, 'rgba(46, 204, 113, 0)');
                ctx.fillStyle = grad;
                ctx.fill(fillPath);
            }

            // Draw the Line
            ctx.strokeStyle = color;
            ctx.lineWidth = 2;
            ctx.stroke(linePath);
        };

        renderPath(successData, '#2ecc71', true);
        renderPath(clientData, '#f39c12', true);
        renderPath(serverData, '#e74c3c', true);

        ctx.restore();
    }

    function buildMatchTree(node, isRoot = false) {
        if (!node) return '';

        // Silently unwrap the implicit root 'AndPredicate'
        if (isRoot && node.name === 'AndPredicate' && node.children && node.children.length > 0) {
            let unwrappedHtml = '';
            node.children.forEach(child => {
                unwrappedHtml += buildMatchTree(child, false);
            });
            return unwrappedHtml;
        }

        let displayText = node.summary || node.name;
        if (displayText.startsWith(node.name + ': ')) {
            displayText = displayText.substring(node.name.length + 2);
        } else if (displayText === node.name) {
            displayText = '';
        }

        let html = `
    <div style="margin-left: 8px; padding-left: 16px; border-left: 2px solid rgba(128,128,128,0.2); margin-top: 6px; position: relative;">
        <div style="position: absolute; left: 0; top: 10px; width: 12px; border-top: 2px solid rgba(128,128,128,0.2);"></div>
        <div style="display: flex; align-items: center; gap: 8px;">
            <span style="font-weight: 300; font-size: 0.8rem; background: rgba(0, 168, 255, 0.08); padding: 2px 6px; border-radius: 4px;">${node.name}</span>
            ${displayText ? `<span class="text-dim text-truncate" title="${displayText}">${displayText}</span>` : ''}
        </div>`;

        if (node.children && node.children.length > 0) {
            node.children.forEach(child => {
                html += buildMatchTree(child, false);
            });
        }
        html += `</div>`;
        return html;
    }

    function buildPipelinePhasesHtml(node, destination) {
        if (!node) return '<div class="sub text-muted" style="padding: 4px;">No pipeline configured.</div>';

        const phases = {
            clientReq: [],
            upstreamReq: [],
            core: 'UpstreamProxy',
            clientRes: [],
            completed: []
        };

        let curr = node;
        while (curr) {
            if (!curr.on_client_request && !curr.on_upstream_request && !curr.on_client_response && !curr.on_completed && !curr.child) {
                phases.core = curr.id || curr.name;
            } else {
                if (curr.on_client_request) phases.clientReq.push(curr.name);
                if (curr.on_upstream_request) phases.upstreamReq.push(curr.name);
                if (curr.on_client_response) phases.clientRes.unshift(curr.name);
                if (curr.on_completed) phases.completed.unshift(curr.name);
            }
            curr = curr.child;
        }

        let cleanDest = destination || phases.core || 'N/A';
        const destMatch = cleanDest.match(/url='([^']+)'/);
        if (destMatch && destMatch[1]) {
            cleanDest = destMatch[1];
        }

        const renderPhase = (title, items, icon, colorHex, bgColor) => {
            if (items.length === 0) return '';
            let html = `<div style="margin-bottom: 16px;">`;
            html += `<div class="sub text-dim" style="border-bottom: 1px solid rgba(128,128,128,0.2); margin-bottom: 8px; padding-bottom: 4px; font-weight: 300; font-size: 0.8em; letter-spacing: 0.5px;">${icon} ${title}</div>`;
            items.forEach((item) => {
                html += `
            <div style="padding-left: 12px; margin-top: 6px; margin-bottom: 6px;">
                <span style="color: #ccc; font-weight: 300; background: ${bgColor}; padding: 2px 6px; border-radius: 4px; display: inline-block;">${item}</span>
            </div>`;
            });
            html += `</div>`;
            return html;
        };

        let html = '<div style="margin-left: 4px;">';
        html += renderPhase('CLIENT REQUEST', phases.clientReq, '↓', '#a29bfe', 'rgba(162, 155, 254, 0.08)');
        html += renderPhase('UPSTREAM REQUEST', phases.upstreamReq, '↓', '#74b9ff', 'rgba(116, 185, 255, 0.08)');

        html += `<div style="margin-bottom: 16px;">`;
        html += `<div class="sub text-dim" style="border-bottom: 1px solid rgba(128,128,128,0.2); margin-bottom: 8px; padding-bottom: 4px; font-weight: 600; font-size: 0.8em; letter-spacing: 0.5px;">◆ TARGET</div>`;
        html += `
    <div style="padding-left: 12px; margin-top: 6px; margin-bottom: 6px;">
        <span style="font-weight: 600; background: rgba(232, 65, 24, 0.08); padding: 2px 6px; border-radius: 4px; display: inline-block;">${cleanDest}</span>
    </div>`;
        html += `</div>`;

        html += renderPhase('CLIENT RESPONSE', phases.clientRes, '↑', '#fdcb6e', 'rgba(253, 203, 110, 0.08)');
        html += renderPhase('COMPLETED', phases.completed, '↑', '#00b894', 'rgba(0, 184, 148, 0.08)');
        html += '</div>';

        return html;
    }

            const r2xxRps = r.sparkline_data ? last(r.sparkline_data.success) / 2 : 0;
            const r4xxRps = r.sparkline_data ? last(r.sparkline_data.client_error) / 2 : 0;
            const r5xxRps = r.sparkline_data ? last(r.sparkline_data.server_error) / 2 : 0;
            const rRpsTotal = r2xxRps + r4xxRps + r5xxRps;

            html += `
        <tr class="clickable-row" onclick="showDetails('${config.id}')">
            <td class="col-route">
                ${mRow('ROUTE', config.id, true)}
                ${mRow('LAST ACTIVE', timeAgo(s.last_active), false)}
                ${mRow('ACTIVE REQUESTS', s.active, false, rActiveHttpStyle)}
                ${mRow('AVERAGE RESPONSE TIME', parseDurationMs(p.average_latency).toFixed(FRACTION_DIGITS) + 'ms', false)}
            </td>
            <td class="col-active">
               <canvas id="canvas_${config.id}" width="200" height="60" style="margin-top: 8px;"></canvas>
            </td>
            <td class="col-totals">
                ${mRow('SUM', formatCompact(s.total), true, '', formatCompact(Math.round(rRpsTotal)) + PER_SEC)}
                ${mRow('2xx', formatCompact(st2xx), false, t2xxStyle, formatCompact(Math.round(r2xxRps)) + PER_SEC)}
                ${mRow('4xx', formatCompact(err4xx), false, t4xxStyle, formatCompact(Math.round(r4xxRps)) + PER_SEC)}
                ${mRow('5xx', formatCompact(err5xx), false, t5xxStyle, formatCompact(Math.round(r5xxRps)) + PER_SEC)}
            </td>
            <td class="col-ingress">
                ${mRow('SUM', formatBytes(t.ingress.total_bytes, uRoute), true, '', formatBytes(t.egress.total_bytes, uRoute))}
                ${mRow('HDR', formatBytes(t.ingress.header_bytes, uRoute), false, '', formatBytes(t.egress.header_bytes, uRoute))}
                ${mRow('BDY', formatBytes(t.ingress.body_bytes, uRoute), false, '', formatBytes(t.egress.body_bytes, uRoute))}
            </td>
            <td class="col-journal">
                ${mRow('SIZE', formatBytes(t.journal_storage_bytes, uRoute), true)}
                ${mRow('LVL', 'REQ: ' + jBadge(reqJourn), false, '', 'RES: ' + jBadge(resJourn))}
            </td>
        </tr>`;
        });

        view.innerHTML = html;

        const sysSparkline = {success: [], client_error: [], server_error: []};
        const bufferSize = data.route_metrics && data.route_metrics[0] && data.route_metrics[0].sparkline_data ? data.route_metrics[0].sparkline_data.success.length : 0;

        if (bufferSize > 0) {
            for (let i = 0; i < bufferSize; i++) {
                sysSparkline.success[i] = 0;
                sysSparkline.client_error[i] = 0;
                sysSparkline.server_error[i] = 0;
            }

            (data.route_metrics || []).forEach(m => {
                if (m.sparkline_data) {
                    for (let i = 0; i < bufferSize; i++) {
                        sysSparkline.success[i] += (m.sparkline_data.success[i] || 0);
                        sysSparkline.client_error[i] += (m.sparkline_data.client_error[i] || 0);
                        sysSparkline.server_error[i] += (m.sparkline_data.server_error[i] || 0);
                    }
                }
            });

            const sysCanvas = document.getElementById('canvas___SYSTEM__');
            if (sysCanvas) drawStackedSparkline(sysCanvas, sysSparkline);
        }

        data.route_configs.forEach(config => {
            const canvas = document.getElementById(`canvas_${config.id}`);
            const metrics = (data.route_metrics || []).find(m => m.id === config.id);
            if (canvas && metrics && metrics.sparkline_data) {
                drawStackedSparkline(canvas, metrics.sparkline_data);
            }
        });
    }

    async function update() {
        try {
            const res = await fetch(window.location.href, {headers: {'Accept': 'application/json'}});
            const data = await res.json();

            window.currentData = data;

            const sys = data.system;
            const mem = sys.memory || data.memory || null;

            if (mem && mem.gc_time_ms !== undefined) {
                if (previousGcTime !== null) {
                    // Since we poll every 1 second, the delta is roughly our ms/sec rate
                    currentGcRate = mem.gc_time_ms - previousGcTime;
                }
                previousGcTime = mem.gc_time_ms;
            }

            const disk = data.journaling?.available_space ? formatBytes(data.journaling.available_space) : '--';
            const activeConns = data.connector_statistics?.active_connections || 0;

            // Fallback to 'Unversioned' if the YAML doesn't specify one
            const routesVer = data.route_version || 'Unversioned';

            vitals.innerText = `UPTIME: ${formatUptime(data.system.uptime)} | ROUTES: ${routesVer} | DISK: ${disk} FREE | CONNECTIONS: ${activeConns}`;

            const version = data.system.version || 'Unknown';
            document.getElementById('sys-version').innerText = version;
            document.getElementById('routes-version').innerText = routesVer;

            timeEl.innerHTML = `<span class="status-indicator" style="color: #00aa00;">●</span>ONLINE`;

            window.currentConfigs = {};
            if (data.route_configs) {
                data.route_configs.forEach(c => window.currentConfigs[c.id] = c);
            }

            window.currentMetrics = {};
            if (data.route_metrics) {
                data.route_metrics.forEach(m => window.currentMetrics[m.id] = m);
            }

            renderTable(data);

            if (panel.classList.contains('open')) {
                if (window.currentOpenRoute === '__SYSTEM__') {
                    showSystemDetails();
                } else if (window.currentOpenRoute === '__CONFIG__') {
                    showConfigDetails();
                } else if (window.currentOpenRoute) {
                    showDetails(window.currentOpenRoute);
                }
            }
        } catch (e) {
            console.error(e)
            timeEl.innerHTML = `<span class="status-indicator" style="color: #ff4444;">●</span>OFFLINE`;
        }
    }

    setInterval(update, 1000);
    update();
</script>
</body>
</html>
