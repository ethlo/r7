<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>r7 gateway</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container" id="main-container">
    <header>
        <div>
            <h1><span>r7</span> GATEWAY</h1>
            <div class="sys-vitals" id="sys-vitals">UPTIME: -- | VERSION: -- | DISK: --</div>
        </div>
        <div class="sys-info" id="last-update">CONNECTING...</div>
    </header>
    <table id="route-table">
        <thead>
        <tr>
            <th class="col-route">SPARKLINE</th>
            <th class="col-route">ROUTE ID</th>
            <th class="col-totals">TOTALS</th>
            <th class="col-ingress">INGRESS</th>
            <th class="col-egress">EGRESS</th>
            <th class="col-active">STATUS</th>
            <th class="col-journal">JOURNAL</th>
        </tr>
        </thead>
        <tbody id="view"></tbody>
    </table>

    <footer class="app-footer">
        r7 GATEWAY // VERSION: <span id="sys-version">--</span>
    </footer>
</div>

<div id="details-panel">
    <div id="details-content"></div>
</div>
<script src="script.js"></script>
</body>
</html>
