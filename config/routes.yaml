version: '{{git.rev.abbr}}'
globals:
  timeouts:
    connect: PT5s
    read: PT30s
  filters:
    - CorrelationIdHeader
    - AddResponseHeader:
        name: X-Powered-By
        value: R7
routes:
  - id: forward-status
    upstream:
      targets:
        - url: http://localhost:18888
    match:
      - PathStartsWith:
          prefix: ${SECRET_URL:/status}
  - id: reject-benchmark
    upstream:
      targets:
        - url: http://localhost:1111
    match:
      - PathStartsWith:
          prefix: /benchmark
    filters:
      - SimpleMetrics
      - RequireAuthorizationHeader

  - id: undertow-internal-backend
    match:
      - PathStartsWith:
          prefix: /hello
      - Method:
          include:
            - GET
            - POST
    upstream:
      targets:
        - url: http://localhost:1111
    filters:
      - SimpleMetrics
      - CircuitBreaker:
          failure_threshold: 10
          cooldown_period: PT15s
      - RateLimiter:
          capacity: 5
          refill_tokens: 1
          refill_period: PT1s
      - AddResponseHeader:
          name: Powered-By
          value: R7
      - CorrelationIdHeader
      - RequireAuthorizationHeader
    journal:
      request:
        level: NONE
        status_overrides:
          401,403: HEADERS
          429: METADATA
          5xx: HEADERS
      response:
        level: METADATA

  - id: ws-test
    upstream:
      targets:
        - url: http://127.0.0.1:8080
    match:
      PathStartsWith:
        prefix: /ws
    journal:
      request:
        level: METADATA
        status_overrides:
          5xx: HEADERS
      response:
        level: HEADERS
        status_overrides:
          2xx: NONE
    filters:
      - SimpleMetrics

  - id: home-assistant
    upstream:
      targets:
        - url: http://192.168.50.103:8123
    match:
      - PathStartsWith:
          prefix: /ha
    journal:
      request:
        level: METADATA
        status_overrides:
          5xx: HEADERS
      response:
        level: HEADERS
    filters:
      - SimpleMetrics
      - StripPathPrefix:
          parts: 1
