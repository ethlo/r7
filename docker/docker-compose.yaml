services:
  r7-api:
    image: r7-server:latest
    container_name: ethlo-r7-gateway
    ports:
      - "9999:8888"
      - "19999:18888"
    volumes:
      - ./config/routes.yaml:/workspace/routes.yaml:ro
      - ./config/server.yaml:/workspace/server.yaml:ro
      - ./config/logback.xml:/workspace/logback.xml:ro
      - ./journals:/journals:rw
    environment:
      - JAVA_TOOL_OPTIONS=
        -XX:+UseZGC
        --enable-native-access=ALL-UNNAMED
        --sun-misc-unsafe-memory-access=allow
    deploy:
      resources:
        limits:
          memory: 990M
          cpus: 16
        reservations:
          memory: 500M

    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8888"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

    restart: unless-stopped