name: Build and Push r7 to GHCR

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-jvm:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'

      # Install flatc natively on the GitHub runner (no emulation)
      - name: Install flatc
        run: |
          curl -L -o flatc.zip "https://github.com/google/flatbuffers/releases/download/v25.2.10/Linux.flatc.binary.clang++-18.zip"
          sudo unzip flatc.zip -d /usr/local/bin/
          sudo chmod +x /usr/local/bin/flatc

      # Compile natively on the runner
      - name: Build JVM Jar
        run: ./mvnw clean package -DskipTests -pl r7-undertow -am

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Buildx packages the identically compiled JAR into both architecture bases instantly
      - name: Build and push multi-arch JVM image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.jvm
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ghcr.io/${{ github.repository }}-jvm:latest