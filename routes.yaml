routes:
  - id: performance test to nginx
    uri:
      - http://localhost:1111
    match:
      - pathStartsWith: /hello
      - method:
          - GET
          - POST
    journal:
      request: METADATA
      response: FULL
    filters:
      - type: AddResponseHeader
        args:
          name: X-Gateway
          value: Venturi
      - type: CorrelationIdHeader
  - id: external-test
    uri:
      - https://www.nrk.no
    match:
        - pathStartsWith: /nrk
    filters:
      - type: StripPathPrefix
        args:
          parts: 1