routes:
  - id: performance test to nginx
    #uri: http://test-backend:80
    uri: http://127.0.0.1:11111
    match:
      and:
        - pathStartsWith:
        - method: GET
    audit:
      request: HEADERS
      response: NONE
    filters:
      - type: AddResponseHeader
        args:
          name: X-Gateway
          value: Venturi