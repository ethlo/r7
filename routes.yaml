routes:
  - id: undertow-internal-backend
    uri:
      - http://localhost:1111
    match:
      - PathStartsWith:
          prefix: /hello
      - Method:
          include:
            - GET
            - POST
    journal:
      request:
        level: METADATA
        status_overrides:
          401,403: HEADERS
      response:
        level: NONE
    filters:
      - AddResponseHeader:
          name: X-Gateway
          value: Venturi
      - CorrelationIdHeader
      - RequireAuthorizationHeader
  - id: external-test
    uri:
      - https://www.nrk.no
    match:
      - PathStartsWith:
          prefix: /nrk
    filters:
      - StripPathPrefix:
          parts: 1