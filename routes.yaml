routes:
  - id: performance test to nginx
    uri:
      - http://localhost:1111
    match:
      - pathStartsWith: /hello
      - method:
          - GET
          - POST
    audit:
      request: HEADERS
      response: FULL
    filters:
      - type: AddResponseHeader
        args:
          name: X-Gateway
          value: Venturi
      - type: CorrelationIdHeader
  - id: external-test
    uri:
      - https://www.nrk.no
    match:
        - pathStartsWith: /nrk
    filters:
      - type: StripPrefix
        args:
          parts: 1