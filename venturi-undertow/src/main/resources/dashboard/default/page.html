<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ETHLO R7 // STATUS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container" id="main-container">
    <header>
        <div>
            <h1>ETHLO // <span>R7</span> GATEWAY</h1>
            <div class="sys-vitals" id="sys-vitals">UPTIME: -- | VERSION: -- | DISK: --</div>
        </div>
        <div class="sys-info" id="last-update">CONNECTING...</div>
        <!--<button id="theme-toggle" class="theme-btn">TOGGLE THEME</button>-->
    </header>
    <table id="route-table">
        <thead>
        <tr>
            <th>ROUTE ID</th>
            <th class="text-right">REQUESTS</th>
            <th class="text-right">TRAFFIC (INGRESS / EGRESS)</th>
            <th class="text-right">JOURNAL</th>
            <th class="text-right">ACTIVE</th>
            <th class="text-right">AVG LATENCY</th>
        </tr>
        </thead>
        <tbody id="view"></tbody>
    </table>

    <footer class="app-footer">
        ETHLO // R7 GATEWAY // VERSION: <span id="sys-version">--</span>
    </footer>
</div>

<div id="details-panel">
    <span class="close-btn" onclick="closeDetails()">[ CLOSE ]</span>
    <h2 id="route-title">ROUTE_ID</h2>

    <div class="config-section">
        <div class="config-label">Upstream Configuration</div>
        <pre id="config-upstream">Fetching...</pre>
    </div>

    <div class="config-section">
        <div class="config-label">Filter Chain</div>
        <pre id="config-filters">Fetching...</pre>
    </div>

    <div class="config-section">
        <div class="config-label">Journal Policy</div>
        <div id="config-journal">Fetching...</div>
    </div>
</div>
<script src="script.js"></script>
</body>
</html>
